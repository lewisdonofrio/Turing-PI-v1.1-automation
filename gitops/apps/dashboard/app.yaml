# =====================================================================
# FILE: /opt/ansible-k3s-cluster/gitops/apps/dashboard/app.yaml
# PURPOSE:
#   GitOps-managed deployment of Kubernetes Dashboard.
# =====================================================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubernetes-dashboard
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io

spec:
  project: default

  source:
    repoURL: https://kubernetes.github.io/dashboard/
    chart: kubernetes-dashboard
    targetRevision: 7.5.0
    helm:
      releaseName: kubernetes-dashboard
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: kubernetes-dashboard

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true

    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    # Dashboard mutates its own service account token secret
    - group: ""
      kind: Secret
      name: kubernetes-dashboard-token
      namespace: kubernetes-dashboard
      jsonPointers:
        - /data
