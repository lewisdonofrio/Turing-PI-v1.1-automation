# =====================================================================
# FILE: /opt/ansible-k3s-cluster/gitops/apps/ingress/app.yaml
# PURPOSE:
#   GitOps-managed deployment of ingress-nginx.
#   Replaces the bootstrap Helmfile version once GitOps is active.
# =====================================================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/REPLACE_ME/k3s-platform.git
    targetRevision: main
    path: gitops/apps/ingress/chart

  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
