# =====================================================================
# FILE: /opt/ansible-k3s-cluster/gitops/apps/cert-manager/app.yaml
# PURPOSE:
#   GitOps-managed deployment of cert-manager.
#   CRDs are still applied manually during bootstrap.
# =====================================================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/REPLACE_ME/k3s-platform.git
    targetRevision: main
    path: gitops/apps/cert-manager/chart

  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
