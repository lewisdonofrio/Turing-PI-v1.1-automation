# =====================================================================
## TMPFS-PURGED #  /opt/ansible-k3s-cluster/playbooks/kernel-build.yml
#
#  Purpose:
#    Perform a distributed kernel build on the builder node using
#    plain distcc (no pump-mode). This playbook delegates all build
#    logic to the canonical shell scripts maintained under
#    /home/builder/scripts.
#
#  Notes:
#    - ASCII-only, nano-safe, deterministic.
#    - No tabs, no Unicode, no timestamps.
#    - This playbook ONLY runs the build. All post-build steps
#      (artifact organization, backup, install, verify) are handled
#      by separate scripts or playbooks.
# =====================================================================

- name: Distributed kernel build on builder (plain distcc)
  hosts: builder
  become: true
  gather_facts: false

  vars:
    workspace: "/home/builder/src/kernel"
    scripts_dir: "/home/builder/scripts"
## TMPFS-PURGED     build_script: "/home/builder/scripts/kernel-build.sh"
## TMPFS-PURGED     preflight_script: "/home/builder/scripts/kernel-build-preflight.sh"
## TMPFS-PURGED     build_log: "/home/builder/src/kernel/kernel-build.log"

    # Plain distcc cluster (no pump)
    distcc_hosts: >
      kubenode2.home.lab
      kubenode3.home.lab
      kubenode4.home.lab
      kubenode5.home.lab
      kubenode6.home.lab
      kubenode7.home.lab

    kernel_safe_path: "/usr/lib/distcc:/usr/bin:/usr/local/bin:/usr/sbin:/bin:/usr/bin/core_perl"

  environment:
    PATH: "{{ kernel_safe_path }}"
    DISTCC_HOSTS: "{{ distcc_hosts }}"
    CC: "distcc gcc"
    HOSTCC: "distcc gcc"
    HOSTCXX: "distcc g++"
    ARCH: "arm"
    CROSS_COMPILE: "arm-linux-gnueabihf-"
    MAKEFLAGS: "CC='distcc gcc'"

  tasks:

    # ---------------------------------------------------------------
    # Workspace validation
    # ---------------------------------------------------------------

    - name: Ensure kernel workspace exists
      ansible.builtin.stat:
        path: "{{ workspace }}"
      register: ws

    - name: Fail if workspace missing
      ansible.builtin.fail:
        msg: "Kernel workspace missing at {{ workspace }}"
      when: not ws.stat.exists

    - name: Ensure .config exists
      ansible.builtin.stat:
        path: "{{ workspace }}/.config"
      register: config_stat

    - name: Fail if .config missing
      ansible.builtin.fail:
        msg: ".config missing in kernel workspace"
      when: not config_stat.stat.exists

    # ---------------------------------------------------------------
    # Preflight (shell script)
    # ---------------------------------------------------------------

    - name: Run kernel build preflight (plain distcc)
      ansible.builtin.command:
        cmd: "{{ preflight_script }}"
      register: preflight_output
      changed_when: true

    # ---------------------------------------------------------------
    # Distributed kernel build (shell script)
    # ---------------------------------------------------------------

    - name: Run distributed kernel build (plain distcc)
      ansible.builtin.command:
        cmd: "{{ build_script }}"
      register: build_output
      changed_when: true

    # ---------------------------------------------------------------
    # Summary
    # ---------------------------------------------------------------

    - name: Report build completion
      ansible.builtin.debug:
        msg:
          - "Kernel build completed using plain distcc."
          - "Build log: {{ build_log }}"
          - "Next steps: run kernel-post-build-worker7.sh"
