# =====================================================================
#  /opt/ansible-k3s-cluster/playbooks/kernel-install.yml
#
#  Purpose:
#    Install a fully staged kernel onto cluster nodes using only
#    Ansible tasks. No scripts. No reboot. No verification.
#
#  Notes:
#    - Assumes artifacts are staged under:
#        /home/builder/artifacts/kernel/<timestamp>/
#    - Assumes modules are staged under:
#        /home/builder/kernel-out/lib/modules/<kernelrelease>/
#    - Idempotent and safe.
# =====================================================================

- name: Install kernel on cluster nodes (script-free)
  hosts: kubenodes
  become: yes
  gather_facts: no

  vars:
    # Path to the selected artifact directory (set externally or via extra-vars)
    artifact_dir: "/home/builder/artifacts/kernel/{{ kernel_timestamp }}"
    staging_modules: "/home/builder/kernel-out/lib/modules/{{ kernelrelease }}"
    boot_dir: "/boot"
    modules_target: "/usr/lib/modules/{{ kernelrelease }}"

  tasks:

    # ---------------------------------------------------------------
    # Validate artifact directory
    # ---------------------------------------------------------------

    - name: Ensure artifact directory exists
      stat:
        path: "{{ artifact_dir }}"
      register: art

    - name: Fail if artifact directory missing
      fail:
        msg: "Artifact directory not found: {{ artifact_dir }}"
      when: not art.stat.exists

    # ---------------------------------------------------------------
    # Validate kernel images
    # ---------------------------------------------------------------

    - name: Ensure required kernel images exist
      stat:
        path: "{{ artifact_dir }}/{{ item }}"
      loop:
        - zImage
        - Image
        - vmlinux
      register: image_stats

    - name: Fail if any kernel image missing
      fail:
        msg: "Missing kernel image(s) in {{ artifact_dir }}"
      when: image_stats.results | selectattr('stat.exists', 'equalto', false) | list | length > 0

    # ---------------------------------------------------------------
    # Install kernel images
    # ---------------------------------------------------------------

    - name: Install zImage
      copy:
        src: "{{ artifact_dir }}/zImage"
        dest: "{{ boot_dir }}/zImage-{{ kernelrelease }}"
        owner: root
        group: root
        mode: "0644"

    - name: Install Image
      copy:
        src: "{{ artifact_dir }}/Image"
        dest: "{{ boot_dir }}/Image-{{ kernelrelease }}"
        owner: root
        group: root
        mode: "0644"

    - name: Install vmlinux
      copy:
        src: "{{ artifact_dir }}/vmlinux"
        dest: "{{ boot_dir }}/vmlinux-{{ kernelrelease }}"
        owner: root
        group: root
        mode: "0644"

    # ---------------------------------------------------------------
    # Install metadata
    # ---------------------------------------------------------------

    - name: Install metadata files
      copy:
        src: "{{ artifact_dir }}/{{ item }}"
        dest: "{{ boot_dir }}/{{ item }}-{{ kernelrelease }}"
        owner: root
        group: root
        mode: "0644"
      loop:
        - System.map
        - .config
        - Module.symvers
        - modules.builtin
        - modules.builtin.modinfo

    # ---------------------------------------------------------------
    # Install DTBs and overlays
    # ---------------------------------------------------------------

    - name: Install DTBs
      copy:
        src: "{{ artifact_dir }}/dtbs/"
        dest: "{{ boot_dir }}/dtbs-{{ kernelrelease }}/"
        owner: root
        group: root
        mode: "0644"
        recursive: yes

    # ---------------------------------------------------------------
    # Install modules
    # ---------------------------------------------------------------

    - name: Ensure module directory exists
      file:
        path: "{{ modules_target }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Copy modules tree
      copy:
        src: "{{ staging_modules }}/"
        dest: "{{ modules_target }}/"
        owner: root
        group: root
        mode: "0644"
        recursive: yes

    # ---------------------------------------------------------------
    # Update boot symlinks
    # ---------------------------------------------------------------

    - name: Update /boot/zImage symlink
      file:
        src: "zImage-{{ kernelrelease }}"
        dest: "{{ boot_dir }}/zImage"
        state: link

    - name: Update /boot/Image symlink
      file:
        src: "Image-{{ kernelrelease }}"
        dest: "{{ boot_dir }}/Image"
        state: link

    - name: Update /boot/dtbs symlink
      file:
        src: "dtbs-{{ kernelrelease }}"
        dest: "{{ boot_dir }}/dtbs"
        state: link

    # ---------------------------------------------------------------
    # Summary
    # ---------------------------------------------------------------

    - name: Report installation summary
      debug:
        msg: "Kernel {{ kernelrelease }} installed on {{ inventory_hostname }} from {{ artifact_dir }}"
