# roles/kernel_build/tasks/main.yml
# Purpose: End-to-end kernel build pipeline for CM3+ workers.
# Behavior: Fetches kernel sources, applies patches, configures build,
#           runs distcc-accelerated make, validates artifacts, and
#           organizes outputs deterministically.
# Author: Lewis Donofrio
# Notes: ASCII-only. Idempotent. Safe to run at any time.
# Doctrine:
#   - tmpfs is no longer used anywhere in the system.
#   - pump-mode is shim-based and optional.
#   - builder orchestrates; workers compile.
#   - build roots are persistent under /home/builder/src.
#   - artifact collection must be deterministic and nano-safe.

---

# =============================================================================
# 0. Pre-flight validation gates
# =============================================================================
- name: Pre-flight validation gates
  ansible.builtin.debug:
    msg: |
      ============================================================
      KERNEL BUILD PIPELINE STARTING
      - validating environment
      - validating pump-mode (shim-based)
      - validating distcc
      - validating build root
      ============================================================

- name: Validate pumpctl health (shim-based)
  ansible.builtin.shell: /home/builder/scripts/pumpctl health
  register: pump_health
  changed_when: false
  failed_when: pump_health.rc != 0

- name: Validate distccd is active
  ansible.builtin.command: systemctl is-active distccd
  register: distccd_state
  failed_when: distccd_state.stdout != "active"
  changed_when: false

- name: Ensure build root exists
  ansible.builtin.file:
    path: "/home/builder/src/kernel-build"
    state: directory
    owner: builder
    group: builder
    mode: '0755'

---

# =============================================================================
# 1. Fetch kernel sources
# =============================================================================
- name: Fetch kernel tarball
  ansible.builtin.get_url:
    url: "{{ kernel_tarball_url }}"
    dest: "/home/builder/src/kernel-build/kernel.tar.xz"
    mode: '0644'

- name: Extract kernel sources
  ansible.builtin.unarchive:
    src: "/home/builder/src/kernel-build/kernel.tar.xz"
    dest: "/home/builder/src/kernel-build"
    remote_src: true
    creates: "/home/builder/src/kernel-build/linux"

---

# =============================================================================
# 2. Apply patches (if any)
# =============================================================================
- name: Apply kernel patches
  ansible.builtin.shell: |
    for p in /home/builder/src/kernel-build/patches/*.patch; do
      [ -f "$p" ] && patch -p1 < "$p"
    done
  args:
    chdir: "/home/builder/src/kernel-build/linux"
  register: patch_out
  changed_when: false
  failed_when: false

- name: Report patch application
  ansible.builtin.debug:
    msg: "{{ patch_out.stdout | default('no patches applied') }}"

---

# =============================================================================
# 3. Configure kernel
# =============================================================================
- name: Copy defconfig
  ansible.builtin.copy:
    src: "files/{{ kernel_defconfig }}"
    dest: "/home/builder/src/kernel-build/linux/.config"
    mode: '0644'

- name: Run olddefconfig
  ansible.builtin.shell: make olddefconfig
  args:
    chdir: "/home/builder/src/kernel-build/linux"
  register: defconfig_out
  changed_when: false

---

# =============================================================================
# 4. Build kernel (distcc-accelerated)
# =============================================================================
- name: Run kernel build (distcc-accelerated)
  ansible.builtin.shell: |
    /usr/bin/env \
      PATH="/usr/lib/distcc:/usr/bin:/bin" \
      MAKEFLAGS="-j{{ build_jobs }}" \
      DISTCC_VERBOSE=1 \
      make -j{{ build_jobs }}
  args:
    chdir: "/home/builder/src/kernel-build/linux"
  register: build_out
  changed_when: false
  failed_when: build_out.rc != 0

- name: Report build output (summary)
  ansible.builtin.debug:
    msg: "{{ build_out.stdout_lines[-20:] | default('no output') }}"

---

# =============================================================================
# 5. Artifact collection (deterministic)
# =============================================================================
- name: Ensure artifact directory exists
  ansible.builtin.file:
    path: "/home/builder/src/kernel-build/artifacts"
    state: directory
    owner: builder
    group: builder
    mode: '0755'

- name: Collect kernel image
  ansible.builtin.copy:
    src: "/home/builder/src/kernel-build/linux/arch/arm/boot/zImage"
    dest: "/home/builder/src/kernel-build/artifacts/zImage"
    remote_src: true
    mode: '0644'

- name: Collect DTBs
  ansible.builtin.shell: |
    cp arch/arm/boot/dts/*.dtb /home/builder/src/kernel-build/artifacts/
  args:
    chdir: "/home/builder/src/kernel-build/linux"
  changed_when: false

- name: Collect modules
  ansible.builtin.shell: |
    make modules_install INSTALL_MOD_PATH=/home/builder/src/kernel-build/artifacts/modules
  args:
    chdir: "/home/builder/src/kernel-build/linux"
  changed_when: false

---

# =============================================================================
# 6. Post-build validation
# =============================================================================
- name: Validate zImage exists
  ansible.builtin.stat:
    path: "/home/builder/src/kernel-build/artifacts/zImage"
  register: zimage_stat

- name: Report zImage status
  ansible.builtin.debug:
    msg: "zImage present: {{ zimage_stat.stat.exists }}"

- name: Validate DTBs exist
  ansible.builtin.shell: ls /home/builder/src/kernel-build/artifacts/*.dtb 2>/dev/null
  register: dtb_list
  changed_when: false
  failed_when: false

- name: Report DTB status
  ansible.builtin.debug:
    msg: "DTBs: {{ dtb_list.stdout_lines | default('none') }}"

---

# =============================================================================
# 7. Final summary banner
# =============================================================================
- name: Kernel build summary
  ansible.builtin.debug:
    msg: |
      ============================================================
      KERNEL BUILD COMPLETE
      - pump-mode validated (shim-based)
      - distcc active and used
      - kernel sources fetched + extracted
      - patches applied
      - defconfig applied
      - kernel built with -j{{ build_jobs }}
      - artifacts collected deterministically
      - tmpfs logic removed (doctrine-compliant)
      ============================================================
