# /opt/ansible-k3s-cluster/playbooks/cluster-mode-restore.yml
# Purpose: Force CLUSTER MODE after partial or failed transitions.
# Behavior: Stops distccd everywhere, restores all k3s services,
#           removes builder-mode overrides, validates cluster health.
# Author: Lewis Donofrio
# Notes: Safe to run at 2am. Idempotent. ASCII-only.
# Doctrine: tmpfs is no longer used anywhere in the system.

# ---------------------------------------------------------------
# 1. Stop distccd everywhere
# ---------------------------------------------------------------

- name: Stop distccd on all nodes
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Stop distccd service
      ansible.builtin.service:
        name: distccd
        state: stopped
      failed_when: false

    - name: Disable distccd service
      ansible.builtin.command: systemctl disable distccd
      failed_when: false

# ---------------------------------------------------------------
# 2. Remove builder-mode environment overrides
# ---------------------------------------------------------------

- name: Remove builder distcc environment file
  hosts: builder
  become: true
  gather_facts: false
  tasks:
    - name: Delete /etc/profile.d/builder-distcc.sh
      ansible.builtin.file:
        path: /etc/profile.d/builder-distcc.sh
        state: absent

# ---------------------------------------------------------------
# 3. Restore k3s services
# ---------------------------------------------------------------

- name: Restore k3s-server on builder
  hosts: builder
  become: true
  gather_facts: false
  tasks:
    - name: Start k3s-server
      ansible.builtin.service:
        name: k3s
        state: started
      failed_when: false

- name: Restore k3s-agent on workers
  hosts: workers
  become: true
  gather_facts: false
  tasks:
    - name: Start k3s-agent
      ansible.builtin.service:
        name: k3s-agent
        state: started
      failed_when: false

# ---------------------------------------------------------------
# 4. Validate cluster health
# ---------------------------------------------------------------

- name: Validate k3s cluster health
  hosts: builder
  become: true
  gather_facts: false
  tasks:
    - name: Check k3s node list
      ansible.builtin.command: kubectl get nodes
      register: k3s_nodes
      failed_when: false
      changed_when: false

    - name: Display k3s nodes
      ansible.builtin.debug:
        msg: "{{ k3s_nodes.stdout }}"

# ---------------------------------------------------------------
# 5. Final mode banner
# ---------------------------------------------------------------

- name: Report cluster mode restored
  hosts: builder
  gather_facts: false
  tasks:
    - ansible.builtin.debug:
        msg: |
          ============================================================
          CLUSTER MODE RESTORED
          distccd stopped everywhere
          builder environment removed
          k3s-server running on builder
          k3s-agent running on workers
          cluster health validated
          system returned to normal operation
          ============================================================
