# =====================================================================
#  /opt/ansible-k3s-cluster/playbooks/kernel-postbuild-validator.yml
#
#  Purpose:
#    Validate all kernel build artifacts after distributed build
#    completes. Pure validation. No changes. Safe to run at 2am.
#
#  Notes:
#    - ASCII-only, nano-safe, deterministic.
#    - Validates workspace, staging, artifacts, modules, dtbs,
#      overlays, metadata, and build logs.
# =====================================================================

- name: Kernel post-build validation
  hosts: builder
  become: true
  gather_facts: false

  vars:
    workspace: "/home/builder/src/kernel"
    staging_dir: "/home/builder/kernel-out"
    logs_dir: "/home/builder/build-logs"
    artifacts_dir: "/home/builder/artifacts/kernel"
    kernel_images:
      - "arch/arm/boot/zImage"
      - "arch/arm/boot/Image"
      - "vmlinux"
    metadata_files:
      - "System.map"
      - ".config"
      - "Module.symvers"
      - "modules.builtin"
      - "modules.builtin.modinfo"

  tasks:

    # ---------------------------------------------------------------
    # Workspace validation
    # ---------------------------------------------------------------

    - name: Check kernel workspace exists
      ansible.builtin.stat:
        path: "{{ workspace }}"
      register: ws

    - name: Fail if workspace missing
      ansible.builtin.fail:
        msg: "Kernel workspace missing at {{ workspace }}"
      when: not ws.stat.exists

    # ---------------------------------------------------------------
    # Kernel image validation
    # ---------------------------------------------------------------

    - name: Validate kernel images
      ansible.builtin.stat:
        path: "{{ workspace }}/{{ item }}"
      loop: "{{ kernel_images }}"
      register: image_stats

    - name: Report missing kernel images
      ansible.builtin.debug:
        msg: "MISSING: {{ item.item }}"
      loop: "{{ image_stats.results }}"
      when: not item.stat.exists

    - name: Report present kernel images
      ansible.builtin.debug:
        msg: "OK: {{ item.item }}"
      loop: "{{ image_stats.results }}"
      when: item.stat.exists

    # ---------------------------------------------------------------
    # Metadata validation
    # ---------------------------------------------------------------

    - name: Validate metadata files
      ansible.builtin.stat:
        path: "{{ workspace }}/{{ item }}"
      loop: "{{ metadata_files }}"
      register: meta_stats

    - name: Report missing metadata
      ansible.builtin.debug:
        msg: "MISSING: {{ item.item }}"
      loop: "{{ meta_stats.results }}"
      when: not item.stat.exists

    - name: Report present metadata
      ansible.builtin.debug:
        msg: "OK: {{ item.item }}"
      loop: "{{ meta_stats.results }}"
      when: item.stat.exists

    # ---------------------------------------------------------------
    # DTB and overlay validation
    # ---------------------------------------------------------------

    - name: Check DTB directory
      ansible.builtin.stat:
        path: "{{ workspace }}/arch/arm/boot/dts"
      register: dts_stat

    - name: Report DTB directory status
      ansible.builtin.debug:
        msg: "DTB directory exists"
      when: dts_stat.stat.exists

    - name: Report missing DTB directory
      ansible.builtin.debug:
        msg: "MISSING: arch/arm/boot/dts"
      when: not dts_stat.stat.exists

    - name: List DTBs
      ansible.builtin.shell: "ls -1 {{ workspace }}/arch/arm/boot/dts/*.dtb 2>/dev/null || true"
      register: dtb_list
      changed_when: false

    - name: Show DTB count
      ansible.builtin.debug:
        msg: "DTBs found: {{ dtb_list.stdout_lines | length }}"

    - name: List overlays
      ansible.builtin.shell: "ls -1 {{ workspace }}/arch/arm/boot/dts/overlays/*.dtbo 2>/dev/null || true"
      register: dtbo_list
      changed_when: false

    - name: Show overlay count
      ansible.builtin.debug:
        msg: "Overlays found: {{ dtbo_list.stdout_lines | length }}"

    # ---------------------------------------------------------------
    # Module tree validation
    # ---------------------------------------------------------------

    - name: Determine kernelrelease
      ansible.builtin.shell: "make -sC {{ workspace }} kernelrelease"
      register: kernelrelease
      changed_when: false

    - name: Validate module directory
      ansible.builtin.stat:
        path: "{{ staging_dir }}/lib/modules/{{ kernelrelease.stdout }}"
      register: moddir_stat

    - name: Report module directory status
      ansible.builtin.debug:
        msg: "Modules directory exists: {{ staging_dir }}/lib/modules/{{ kernelrelease.stdout }}"
      when: moddir_stat.stat.exists

    - name: Report missing module directory
      ansible.builtin.debug:
        msg: "MISSING: {{ staging_dir }}/lib/modules/{{ kernelrelease.stdout }}"
      when: not moddir_stat.stat.exists

    - name: Count modules
      ansible.builtin.shell: "find {{ staging_dir }}/lib/modules/{{ kernelrelease.stdout }} -type f -name '*.ko' | wc -l"
      register: module_count
      when: moddir_stat.stat.exists
      changed_when: false

    - name: Show module count
      ansible.builtin.debug:
        msg: "Module count: {{ module_count.stdout }}"
      when: moddir_stat.stat.exists

    # ---------------------------------------------------------------
    # Build log validation
    # ---------------------------------------------------------------

    - name: Check build logs directory
      ansible.builtin.stat:
        path: "{{ logs_dir }}"
      register: logs_stat

    - name: Report build logs directory status
      ansible.builtin.debug:
        msg: "Build logs directory exists"
      when: logs_stat.stat.exists

    - name: Report missing build logs directory
      ansible.builtin.debug:
        msg: "MISSING: {{ logs_dir }}"
      when: not logs_stat.stat.exists

    - name: List build logs
      ansible.builtin.shell: "ls -1 {{ logs_dir }}/*.log 2>/dev/null || true"
      register: log_list
      changed_when: false

    - name: Show build log count
      ansible.builtin.debug:
        msg: "Build logs found: {{ log_list.stdout_lines | length }}"
