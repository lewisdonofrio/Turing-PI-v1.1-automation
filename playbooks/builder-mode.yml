# /opt/ansible-k3s-cluster/playbooks/builder-mode.yml
# Purpose: Enter BUILD MODE for distributed kernel builds.
# Behavior: Stops all k3s services, prepares builder + workers,
#           validates distcc + pump readiness. ASCII-only. Idempotent. 2AM-safe.

# ---------------------------------------------------------------
# 1. Stop k3s services
# ---------------------------------------------------------------

- name: Stop k3s-server on builder
  hosts: builder
  become: true
  gather_facts: false
  tasks:
    - name: Stop k3s-server
      ansible.builtin.service:
        name: k3s
        state: stopped
      failed_when: false

- name: Stop k3s-agent on workers
  hosts: workers
  become: true
  gather_facts: false
  tasks:
    - name: Stop k3s-agent
      ansible.builtin.service:
        name: k3s-agent
        state: stopped
      failed_when: false

# ---------------------------------------------------------------
# 2. distcc bootstrap + validation + smoketest
# ---------------------------------------------------------------

- import_playbook: distccd-bootstrap.yml
- import_playbook: cluster-distcc-validate.yml
- import_playbook: cluster-distcc-smoketest.yml

# ---------------------------------------------------------------
# 3. Ensure distccd state is correct
# ---------------------------------------------------------------

- name: Ensure distccd is NOT running on builder
  hosts: builder
  become: true
  gather_facts: false
  tasks:
    - name: Stop distccd on builder
      ansible.builtin.systemd:
        name: distccd
        enabled: no
        state: stopped
      failed_when: false

- name: Ensure distccd IS running on workers
  hosts: workers
  become: true
  gather_facts: false
  tasks:
    - name: Start distccd on workers
      ansible.builtin.systemd:
        name: distccd
        enabled: yes
        state: started

# ---------------------------------------------------------------
# 4. Builder environment enforcement (PATH, HOSTS, CC)
# ---------------------------------------------------------------

- name: Enforce builder PATH + CC environment
  hosts: builder
  become: true
  gather_facts: false
  tasks:
    - name: Write builder distcc environment file
      ansible.builtin.copy:
        dest: /etc/profile.d/builder-distcc.sh
        mode: '0644'
        content: |
          # Builder distcc environment
          export PATH="/usr/lib/distcc/bin:/usr/lib/distcc:/usr/local/sbin:/usr/local/bin:/usr/bin:/usr/sbin:/sbin:/bin"
          export DISTCC_PUMP=1
          export DISTCC_HOSTS="kubenode2.home.lab/6 kubenode3.home.lab/6 kubenode4.home.lab/6 kubenode5.home.lab/6 kubenode6.home.lab/6 kubenode7.home.lab/6"
          export HOSTCC="/usr/bin/gcc"
          export HOSTCXX="/usr/bin/g++"

# ---------------------------------------------------------------
# 5. Pump-mode smoke test (builder only)
# ---------------------------------------------------------------

- name: Pump-mode smoke test
  hosts: builder
  become: true
  gather_facts: false
  vars:
    build_root: "/home/builder/src/kernel-smoketest"
  tasks:
    - name: Ensure smoketest directory exists
      ansible.builtin.file:
        path: "{{ build_root }}"
        state: directory
        owner: builder
        group: builder
        mode: '0755'

    - name: Run pump-mode tiny compile (disk-based)
      ansible.builtin.command: >
        pump distcc gcc -c -o {{ build_root }}/test.o -x c /dev/null
      register: pump_test
      failed_when: pump_test.rc != 0
      changed_when: false

# ---------------------------------------------------------------
# 6. Final mode banner
# ---------------------------------------------------------------

- name: Report builder mode active
  hosts: builder
  gather_facts: false
  tasks:
    - ansible.builtin.debug:
        msg: |
          ============================================================
          BUILD MODE ACTIVE
          k3s stopped on all nodes
          distccd running on workers
          distccd disabled on builder
          PATH + CC environment enforced
          pump-mode verified (disk-based)
          Ready for distributed kernel build
          ============================================================
