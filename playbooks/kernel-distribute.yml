# =====================================================================
#  /opt/ansible-k3s-cluster/playbooks/kernel-distribute.yml
#
#  Purpose:
#    Distribute fully built kernel artifacts from kubenode1 to all
#    cluster nodes. Pure distribution. No install, no reboot.
#
#  Notes:
#    - Assumes artifacts are staged under:
#        /home/builder/artifacts/kernel/<timestamp>/
#    - Assumes modules are staged under:
#        /home/builder/kernel-out/lib/modules/<kernelrelease>/
#    - Idempotent and safe.
# =====================================================================

- name: Distribute kernel artifacts to cluster nodes
  hosts: kubenodes
  become: yes
  gather_facts: no

  vars:
    # Provided externally or via --extra-vars
    artifact_dir: "/home/builder/artifacts/kernel/{{ kernel_timestamp }}"
    staging_dir: "/var/lib/kernel-staging/{{ kernelrelease }}"
    modules_src: "/home/builder/kernel-out/lib/modules/{{ kernelrelease }}"

  tasks:

    # ---------------------------------------------------------------
    # Validate artifact directory
    # ---------------------------------------------------------------

    - name: Ensure artifact directory exists on builder
      delegate_to: kubenode1
      stat:
        path: "{{ artifact_dir }}"
      register: art

    - name: Fail if artifact directory missing
      fail:
        msg: "Artifact directory not found: {{ artifact_dir }}"
      when: not art.stat.exists

    # ---------------------------------------------------------------
    # Create staging directory on target nodes
    # ---------------------------------------------------------------

    - name: Ensure staging directory exists on target
      file:
        path: "{{ staging_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    # ---------------------------------------------------------------
    # Distribute kernel images
    # ---------------------------------------------------------------

    - name: Copy kernel images
      copy:
        src: "{{ artifact_dir }}/{{ item }}"
        dest: "{{ staging_dir }}/{{ item }}"
        owner: root
        group: root
        mode: "0644"
      loop:
        - zImage
        - Image
        - vmlinux

    # ---------------------------------------------------------------
    # Distribute metadata
    # ---------------------------------------------------------------

    - name: Copy metadata files
      copy:
        src: "{{ artifact_dir }}/{{ item }}"
        dest: "{{ staging_dir }}/{{ item }}"
        owner: root
        group: root
        mode: "0644"
      loop:
        - System.map
        - .config
        - Module.symvers
        - modules.builtin
        - modules.builtin.modinfo

    # ---------------------------------------------------------------
    # Distribute DTBs and overlays
    # ---------------------------------------------------------------

    - name: Copy DTBs
      copy:
        src: "{{ artifact_dir }}/dtbs/"
        dest: "{{ staging_dir }}/dtbs/"
        owner: root
        group: root
        mode: "0644"
        recursive: yes

    # ---------------------------------------------------------------
    # Distribute modules tree
    # ---------------------------------------------------------------

    - name: Ensure module directory exists
      file:
        path: "{{ staging_dir }}/modules"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Copy modules tree
      copy:
        src: "{{ modules_src }}/"
        dest: "{{ staging_dir }}/modules/"
        owner: root
        group: root
        mode: "0644"
        recursive: yes

    # ---------------------------------------------------------------
    # Summary
    # ---------------------------------------------------------------

    - name: Display staging summary
      debug:
        msg: "Kernel {{ kernelrelease }} staged on {{ inventory_hostname }} at {{ staging_dir }}"
