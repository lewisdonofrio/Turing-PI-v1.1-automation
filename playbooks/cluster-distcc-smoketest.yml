# /opt/ansible-k3s-cluster/playbooks/cluster-distcc-smoketest.yml
# Purpose: Perform a real distributed compile smoketest across the cluster.
# Behavior: Confirms distcc is functional, workers receive jobs, cc1 runs remotely,
#           pump-mode is healthy, and distributed preprocessing is active.
# Author: Lewis Donofrio
# Notes: Run while watching distccmon-text on the builder. ASCII-only. Idempotent.
# Doctrine: tmpfs is no longer used anywhere in the system.

---

# =============================================================================
# Builder smoketest
# =============================================================================
- name: Distcc smoketest from builder
  hosts: builder
  become: false
  gather_facts: false

  vars_files:
    - /opt/ansible-k3s-cluster/manifest/distcc-hosts.yml

  vars:
    distcc_test_dir: /tmp/distcc-smoketest
    distcc_test_source: /tmp/distcc-smoketest/hello.c
    distcc_test_output: /tmp/distcc-smoketest/hello.o
    distcc_hosts_env: "{{ distcc_hosts | join(' ') }}"

  tasks:

    # -------------------------------------------------------------------------
    # Pump-mode readiness (shim-based)
    # -------------------------------------------------------------------------
    - name: Validate pump-mode health
      ansible.builtin.shell: /home/builder/scripts/pumpctl health
      register: pump_health
      changed_when: false
      failed_when: pump_health.rc != 0

    - name: Report pump-mode health
      ansible.builtin.debug:
        msg: "pumpctl health: OK"

    # -------------------------------------------------------------------------
    # Prepare smoketest directory and source file
    # -------------------------------------------------------------------------
    - name: Create smoketest directory
      ansible.builtin.file:
        path: "{{ distcc_test_dir }}"
        state: directory
        mode: '0755'

    - name: Install test C source
      ansible.builtin.copy:
        dest: "{{ distcc_test_source }}"
        mode: '0644'
        content: |
          #include <stdio.h>
          int main(void) {
              printf("hello from distcc\n");
              return 0;
          }

    - name: Clean previous artifacts
      ansible.builtin.file:
        path: "{{ distcc_test_output }}"
        state: absent

    # -------------------------------------------------------------------------
    # Run distributed compile (forced distcc)
    # -------------------------------------------------------------------------
    - name: Run distcc smoketest compile (forced distcc, explicit paths)
      ansible.builtin.shell: |
        /usr/bin/env \
        PATH="/usr/bin:/bin" \
        DISTCC_HOSTS="{{ distcc_hosts_env }}" \
        DISTCC_VERBOSE=1 \
        /usr/bin/distcc /usr/bin/gcc -v -c "{{ distcc_test_source }}" -o "{{ distcc_test_output }}"
      args:
        chdir: "{{ distcc_test_dir }}"
        executable: /bin/bash
      register: compile_output

    - name: Report compile output
      ansible.builtin.debug:
        msg: "{{ compile_output.stdout_lines }}"

    # -------------------------------------------------------------------------
    # Verify object file
    # -------------------------------------------------------------------------
    - name: Verify object file exists
      ansible.builtin.stat:
        path: "{{ distcc_test_output }}"
      register: obj_stat

    - name: Report object file status
      ansible.builtin.debug:
        msg: "Object file created: {{ obj_stat.stat.exists }}"

    # -------------------------------------------------------------------------
    # Analyze worker participation from verbose output
    # -------------------------------------------------------------------------
    - name: Extract worker hosts from verbose output
      ansible.builtin.shell: |
        echo "{{ compile_output.stdout }}" \
        | grep -oE 'distcc.*[[:space:]]([^ ]+):3632' \
        | awk -F':' '{print $1}'
      register: worker_hosts
      changed_when: false

    - name: Report worker participation
      ansible.builtin.debug:
        msg:
          - "Workers used: {{ worker_hosts.stdout_lines }}"
          - "Worker count: {{ worker_hosts.stdout_lines | length }}"

    # -------------------------------------------------------------------------
    # Detect fallback-to-local
    # -------------------------------------------------------------------------
    - name: Detect fallback to localhost
      ansible.builtin.shell: |
        echo "{{ compile_output.stdout }}" | grep -q "localhost" && echo "fallback" || echo "ok"
      register: fallback_check
      changed_when: false

    - name: Report fallback state
      ansible.builtin.debug:
        msg: "Fallback to localhost: {{ fallback_check.stdout }}"

# =============================================================================
# Worker verification (cc1 activity)
# =============================================================================
- name: Check worker cc1 activity
  hosts: workers
  become: true
  gather_facts: false

  tasks:

    - name: Check for cc1 processes
      ansible.builtin.shell: pgrep -a cc1 || true
      register: cc1_processes
      args:
        executable: /bin/bash

    - name: Report cc1 activity
      ansible.builtin.debug:
        msg: "Worker {{ inventory_hostname }} cc1: {{ cc1_processes.stdout | default('none') }}"

# =============================================================================
# Worker distccd logs
# =============================================================================
- name: Check worker distccd logs
  hosts: workers
  become: true
  gather_facts: false

  tasks:

    - name: Tail last 10 lines of distccd log
      ansible.builtin.shell: tail -n 10 /var/log/distccd/distccd.log || true
      register: distccd_log
      args:
        executable: /bin/bash

    - name: Report distccd log tail
      ansible.builtin.debug:
        msg: "Worker {{ inventory_hostname }} log tail: {{ distccd_log.stdout_lines }}"

# =============================================================================
# Final summary banner
# =============================================================================
- name: Distcc smoketest summary
  hosts: builder
  gather_facts: false
  tasks:
    - ansible.builtin.debug:
        msg: |
          ============================================================
          DISTCC SMOKETEST COMPLETE
          - pump-mode validated (shim-based)
          - distributed compile executed
          - object file verified
          - worker participation analyzed
          - fallback-to-local checked
          - cc1 activity inspected on workers
          - distccd logs tailed
          - tmpfs logic removed (doctrine-compliant)
          ============================================================
