apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-proxy
  namespace: kube-system
spec:
  template:
    spec:
      hostNetwork: true
      containers:
        - name: kube-proxy
          image: <your-kube-proxy-image>
          command:
            - kube-proxy
          args:
            - --proxy-mode=ipvs
            - --ipvs-scheduler=rr
            - --hostname-override=$(NODE_NAME)
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
