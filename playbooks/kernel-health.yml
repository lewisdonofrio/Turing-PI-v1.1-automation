# =====================================================================
#  /opt/ansible-k3s-cluster/playbooks/kernel-health.yml
#
#  Purpose:
#    Verify that nodes successfully booted into the expected kernel
#    and that modules, DTBs, overlays, symlinks, dmesg, networking,
#    and k3s-agent are healthy.
#
#  Notes:
#    - ASCII-only, nano-safe, deterministic.
#    - Must be run AFTER reboot.
# =====================================================================

- name: Kernel post-reboot health verification
  hosts: kernel_targets
  become: true
  gather_facts: false

  vars:
    boot_dir: "/boot"
    modules_dir: "/usr/lib/modules"

  tasks:

    ###################################################################
    # 1. Kernel version
    ###################################################################

    - name: Get running kernel version
      command: uname -r
      register: uname_r
      changed_when: false

    - name: Show running kernel version
      debug:
        msg: "Running kernel: {{ uname_r.stdout }}"

    ###################################################################
    # 2. Verify module directory for running kernel
    ###################################################################

    - name: Check module directory exists
      stat:
        path: "{{ modules_dir }}/{{ uname_r.stdout }}"
      register: moddir

    - name: Fail if module directory missing
      fail:
        msg: "Module directory missing: {{ modules_dir }}/{{ uname_r.stdout }}"
      when: not moddir.stat.exists

    - name: Count .ko files
      find:
        paths: "{{ modules_dir }}/{{ uname_r.stdout }}"
        patterns: "*.ko"
        file_type: file
      register: ko_files

    - name: Fail if no modules found
      fail:
        msg: "No .ko modules found under {{ modules_dir }}/{{ uname_r.stdout }}"
      when: ko_files.matched == 0

    ###################################################################
    # 3. Verify kernel images and symlinks
    ###################################################################

    - name: Check zImage-<version>
      stat:
        path: "{{ boot_dir }}/zImage-{{ uname_r.stdout }}"
      register: zimg

    - name: Fail if zImage missing
      fail:
        msg: "Missing zImage-{{ uname_r.stdout }} in /boot"
      when: not zimg.stat.exists

    - name: Check /boot/zImage symlink
      stat:
        path: "{{ boot_dir }}/zImage"
        follow: false
      register: zimg_link

    - name: Warn if zImage symlink incorrect
      debug:
        msg: "/boot/zImage does not point to zImage-{{ uname_r.stdout }}"
      when: zimg_link.stat.islnk and zimg_link.stat.lnk_source != "zImage-{{ uname_r.stdout }}"

    ###################################################################
    # 4. Verify DTBs and overlays
    ###################################################################

    - name: Check DTB directory
      stat:
        path: "{{ boot_dir }}/dtbs-{{ uname_r.stdout }}"
      register: dtbs

    - name: Fail if DTBs missing
      fail:
        msg: "Missing dtbs-{{ uname_r.stdout }} in /boot"
      when: not dtbs.stat.exists

    - name: Count DTBs
      find:
        paths: "{{ boot_dir }}/dtbs-{{ uname_r.stdout }}"
        patterns: "*.dtb"
      register: dtb_files

    - name: Fail if no DTBs found
      fail:
        msg: "No DTBs found in dtbs-{{ uname_r.stdout }}"
      when: dtb_files.matched == 0

    - name: Count overlays
      find:
        paths: "{{ boot_dir }}/dtbs-{{ uname_r.stdout }}/overlays"
        patterns: "*.dtbo"
      register: dtbo_files

    - name: Fail if no overlays found
      fail:
        msg: "No overlays found in dtbs-{{ uname_r.stdout }}/overlays"
      when: dtbo_files.matched == 0

    ###################################################################
    # 5. dmesg critical scan
    ###################################################################

    - name: Get dmesg
      command: dmesg
      register: dmesg_out
      changed_when: false

    - name: Filter critical patterns
      set_fact:
        dmesg_critical: >-
          {{ dmesg_out.stdout_lines
             | select('search', 'panic|BUG:|Oops|Call Trace|segfault|lockup')
             | list }}

    - name: Show critical dmesg lines
      debug:
        msg: "{{ dmesg_critical }}"
      when: dmesg_critical | length > 0

    ###################################################################
    # 6. k3s-agent status
    ###################################################################

    - name: Check k3s-agent service
      service_facts:

    - name: Show k3s-agent state
      debug:
        msg: "k3s-agent: {{ ansible_facts.services['k3s-agent.service'].state | default('not installed') }}"

    ###################################################################
    # 7. Network readiness
    ###################################################################

    - name: Check default route
      command: ip route show default
      register: route_out
      changed_when: false

    - name: Fail if no default route
      fail:
        msg: "No default route on {{ inventory_hostname }}"
      when: route_out.stdout == ""

    ###################################################################
    # 8. Summary
    ###################################################################

    - name: Health summary
      debug:
        msg:
          - "Kernel health OK on {{ inventory_hostname }}"
          - "Kernel: {{ uname_r.stdout }}"
          - "Modules: {{ ko_files.matched }} found"
          - "DTBs: {{ dtb_files.matched }} found"
          - "Overlays: {{ dtbo_files.matched }} found"
          - "Critical dmesg lines: {{ dmesg_critical | length }}"
