# /opt/ansible-k3s-cluster/playbooks/cluster-mode.yml
# Purpose: Enter CLUSTER MODE for normal k3s operation.
# Behavior: Stops distccd everywhere, removes builder environment overrides,
#           restores k3s services, validates cluster health, enforces ondemand governor.
# Doctrine: tmpfs is no longer used anywhere in the system.

# ---------------------------------------------------------------
# 1. Stop distccd everywhere
# ---------------------------------------------------------------

- name: Stop distccd on all nodes
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Stop distccd service
      ansible.builtin.systemd:
        name: distccd
        state: stopped
      failed_when: false

    - name: Disable distccd service
      ansible.builtin.systemd:
        name: distccd
        enabled: no
      failed_when: false

# ---------------------------------------------------------------
# 2. Enforce ondemand CPU governor (cluster mode)
# ---------------------------------------------------------------

- name: Set CPU governor to ondemand on all nodes
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Apply ondemand governor to all CPUs
      ansible.builtin.shell: |
        for gov in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
          echo ondemand > "$gov" 2>/dev/null || true
        done
      args:
        executable: /bin/bash
      changed_when: false

# ---------------------------------------------------------------
# 3. Remove builder-mode environment overrides
# ---------------------------------------------------------------

- name: Remove builder distcc environment file
  hosts: builder
  become: true
  gather_facts: false
  tasks:
    - name: Delete /etc/profile.d/builder-distcc.sh
      ansible.builtin.file:
        path: /etc/profile.d/builder-distcc.sh
        state: absent

# ---------------------------------------------------------------
# 4. Restore k3s services
# ---------------------------------------------------------------

- name: Start k3s-server on builder
  hosts: builder
  become: true
  gather_facts: false
  tasks:
    - name: Start k3s-server
      ansible.builtin.systemd:
        name: k3s
        enabled: yes
        state: started
      failed_when: false

- name: Start k3s-agent on workers
  hosts: workers
  become: true
  gather_facts: false
  tasks:
    - name: Start k3s-agent
      ansible.builtin.systemd:
        name: k3s-agent
        enabled: yes
        state: started
      failed_when: false

# ---------------------------------------------------------------
# 5. Validate k3s cluster health
# ---------------------------------------------------------------

- name: Validate k3s cluster health
  hosts: builder
  become: true
  gather_facts: false
  tasks:
    - name: Check k3s node list
      ansible.builtin.command: kubectl get nodes
      register: k3s_nodes
      failed_when: false
      changed_when: false

    - name: Display k3s nodes
      ansible.builtin.debug:
        msg: "{{ k3s_nodes.stdout }}"

# ---------------------------------------------------------------
# 6. Final mode banner
# ---------------------------------------------------------------

- name: Report cluster mode active
  hosts: builder
  gather_facts: false
  tasks:
    - ansible.builtin.debug:
        msg: |
          ============================================================
          CLUSTER MODE ACTIVE
          k3s-server running on builder
          k3s-agent running on workers
          distccd stopped everywhere
          ondemand CPU governor applied
          builder environment removed
          k3s cluster validated
          Ready for normal workloads
          ============================================================
