# /opt/ansible-k3s-cluster/playbooks/poweroff.yml
# Purpose: Gracefully shut down the k3s + distcc cluster in a deterministic sequence.
---
# =============================================================================
# Phase 1: Stop pump-mode include-server on builder
# =============================================================================
- name: Stop include-server on builder
  hosts: builder
  become: true
  gather_facts: false

  tasks:

    - name: Stop include-server if running
      ansible.builtin.shell: |
        pkill -f include-server || true
      changed_when: false
      ignore_errors: true


    - name: Stop include-server if running
      ansible.builtin.shell: |
        pkill -f include-server || true
      changed_when: false

    - name: Verify include-server stopped
      ansible.builtin.shell: |
        pgrep -f include-server && echo "running" || echo "stopped"
      register: include_state
      changed_when: false

    - name: Report include-server state
      ansible.builtin.debug:
        msg: "include-server: {{ include_state.stdout }}"

# =============================================================================
# Phase 2: Stop distccd + k3s-agent on workers
# =============================================================================
- name: Stop worker services
  hosts: workers
  become: true
  gather_facts: false

  tasks:

    - name: Stop distccd
      ansible.builtin.service:
        name: distccd
        state: stopped
      ignore_errors: true

    - name: Stop k3s-agent
      ansible.builtin.service:
        name: k3s-agent
        state: stopped
      ignore_errors: true

    - name: Kill lingering cc1
      ansible.builtin.shell: |
        pkill -f cc1 || true
      changed_when: false

# =============================================================================
# Phase 3: Power off workers (FIRST)
# =============================================================================
- name: Power off workers
  hosts: workers
  become: true
  gather_facts: false

  tasks:

    - name: Powering off worker node
      ansible.builtin.shell: |
        systemctl poweroff
      async: 1
      poll: 0
      ignore_errors: true

# =============================================================================
# Phase 4: Stop k3s-server on builder
# =============================================================================
- name: Stop builder services
  hosts: builder
  become: true
  gather_facts: false

  tasks:

    - name: Stop k3s-server
      ansible.builtin.service:
        name: k3s
        state: stopped
      ignore_errors: true

# =============================================================================
# Phase 5: Power off builder (LAST)
# =============================================================================
- name: Power off builder
  hosts: builder
  become: true
  gather_facts: false

  tasks:

    - name: Powering off builder node
      ansible.builtin.shell: |
        systemctl poweroff
      async: 1
      poll: 0
      ignore_errors: true
